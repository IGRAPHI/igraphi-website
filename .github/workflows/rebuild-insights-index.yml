name: Rebuild Insights Index

on:
  push:
    paths:
      - 'content/insights/**.md'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    # Skip if this is the action's own commit (prevents infinite loop)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild _list.json and rss.xml
        run: node .github/scripts/build-insights-index.js

      - name: Commit updated index and RSS
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add content/insights/_list.json insights/rss.xml
          git diff --cached --quiet || git commit -m "chore: rebuild insights index and RSS [skip ci]"
          git push
